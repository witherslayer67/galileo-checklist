<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Dashboard | FRC Pit Tracker</title>
    <style>
        :root {
            --border-color: #333;
            --hover-color: #a8e6cf; 
            --text-main: #000;
            --bg-color: #bf5700; 
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: var(--text-main);
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 4px solid var(--border-color);
            padding-bottom: 10px;
        }

        p {
            font-style: italic;
            margin-top: 10px;
            font-weight: 500;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            width: 90%;
            max-width: 1000px;
            padding: 20px;
        }

        .event-card {
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            padding: 30px;
            text-decoration: none;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            box-shadow: 6px 6px 0px var(--border-color);
        }

        .event-card:hover {
            background-color: var(--hover-color);
            transform: translate(-4px, -4px);
            box-shadow: 20px 20px 0px var(--border-color);
        }

        .event-card:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px var(--border-color);
        }

        .event-name {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .event-year {
            font-size: 0.9rem;
            opacity: 0.7;
            text-transform: uppercase;
        }

        .footer-note {
            position: fixed;
            bottom: 20px;
            font-size: 0.8rem;
            background: #333;
            color: white;
            padding: 8px 15px;
            border-radius: 4px;
        }

        /* Responsive adjustments */
        @media (max-width: 600px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Pit Scout Central</h1>
        <p>Select an event to begin</p>
    </header>

    <div class="dashboard-grid">
        <a href="2026gal.html" class="event-card">
            <span class="event-name">Galileo</span>
            <span class="event-year">Division 2026</span>
        </a>

        <a href="2026nccmp.html" class="event-card">
            <span class="event-name">NCCMP</span>
            <span class="event-year">2026</span>
        </a>

    </div>

    <div class="footer-note">
        Current Week: post-champs
    </div>

</body>
</html>
